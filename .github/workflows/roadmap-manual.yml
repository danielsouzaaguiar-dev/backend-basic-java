on:
  workflow_dispatch:
    inputs:
      sprint:
        description: "Nome da sprint"
        required: true
        type: string

permissions:
  contents: read

jobs:
  executar-tarefa:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar sprint
        run: echo "Sprint escolhida:${{ github.event.inputs.sprint }}"

      - name: Confirmar token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "Token carregado com sucesso"
          else
            echo "Erro: Token nao foi carregado"
            exit 1
          fi
