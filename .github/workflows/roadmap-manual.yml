name: Executar Roadmap Manual

on:
  workflow_dispatch:
    inputs:
      sprint:
        description: "Nome da sprint"
        required: true
        type: string

permissions:
  contents: read

jobs:
  executar-tarefa:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar sprint
        run: echo "Sprint escolhida: ${{ github.event.inputs.sprint }}"

      - name: Testar token
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Token disponível para autenticação"
